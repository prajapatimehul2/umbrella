# /etc/nginx/sites-available/umbrella  (symlink into sites-enabled, or drop in conf.d)
# Reverse-proxies port 80 -> the Next.js server on 127.0.0.1:3000.
# After adding TLS with certbot, it will rewrite this to redirect 80 -> 443.

server {
    listen 80;
    server_name _;   # replace with your domain, e.g. umbrella.example.com

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
