name: CI/CD

# CI runs on every push and PR. CD (deploy to EC2) runs only after a successful
# build on the main branch, or when triggered manually from the Actions tab.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Don't run two deploys (or stale CI) for the same ref at once.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to EC2
    needs: build
    # Only deploy real pushes to main (or manual dispatch) — never PRs.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${EC2_PORT:-22}" -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}

      - name: Run redeploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key -p "${EC2_PORT:-22}" \
            "${EC2_USER}@${EC2_HOST}" \
            "sudo BRANCH=main bash /opt/umbrella-app/deploy/redeploy.sh"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
